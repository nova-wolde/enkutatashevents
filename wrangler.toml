#:schema node_modules/vinext/schema.wrangler.json

name = "enkutatashevents"
compatibility_date = "2025-12-01"
compatibility_flags = ["nodejs_compat"]

# ─── Worker Entry Point ──────────────────────────────────────────────────────
# Auto-generated by vinext deploy. This is the server-side Worker script.
main = "worker/index.ts"

# ─── Static Assets ───────────────────────────────────────────────────────────
# Client assets are served from the dist/client directory after build.
[assets]
directory = "dist/client"
not_found_handling = "single-page-application"

# ─── KV Namespaces ───────────────────────────────────────────────────────────
# Stores uploaded images as base64 strings (free tier, no extra cost).
[[kv_namespaces]]
binding = "IMAGES"
id = "08c660c1339745d6942522eeabebd5e2"

# ─── Environment Variables ───────────────────────────────────────────────────
# Secrets (OWNER_PASSWORD, UPSTASH_REDIS_REST_URL, UPSTASH_REDIS_REST_TOKEN)
# should be set via `wrangler secret put` or the Cloudflare dashboard.
# They MUST NOT be committed to source control.

[vars]
NODE_ENV = "production"

# ─── Production Environment ──────────────────────────────────────────────────
[env.production]
name = "enkutatashevents"
routes = [
  { pattern = "enkutatashevents.com", custom_domain = true },
]

[env.production.vars]
NODE_ENV = "production"

# ─── Staging/Preview Environment ─────────────────────────────────────────────
[env.preview]
name = "enkutatashevents-preview"

[env.preview.vars]
NODE_ENV = "production"
